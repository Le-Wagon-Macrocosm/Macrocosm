name: Deploy frontend (GitHub Pages)

# Builds frontend/ with Vite and publishes dist/ to GitHub Pages. The backend is
# deployed separately (Cloud Run, see ci.yml); the frontend calls it via src/config.js
# (VITE_API_BASE, defaults to the Cloud Run URL; CORS is open).

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# one Pages deploy at a time; let a newer run cancel an in-progress one
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build        # vite base is './' -> works under /<repo>/ Pages path
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
