name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:        # manual trigger for the deploy job (until the app is ready)

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install backend deps
        run: pip install -r backend/requirements.txt pytest httpx   # httpx -> fastapi TestClient
      # The fusion stack loads real artifacts at app startup (lifespan), so the API tests need them.
      # Pull from GCS with the same SA key the deploy job uses (Storage Object Viewer on the bucket).
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Download model artifacts from GCS
        run: |
          set -euo pipefail
          mkdir -p models
          for f in baseline_stack_v4.pkl photoz_cnn_v4.h5 fusion_v4.keras tabular_medians_v4.npy; do
            gcloud storage cp "gs://macrocosm-lewagon/models/$f" "models/$f"
          done
          ls -lh models/
      - name: Import smoke test
        run: python -c "import backend.main"
      - name: Unit tests
        run: pytest -q backend/tests

  deploy:
    # Manual for now. Once the backend serves a real model, switch the guard to:
    #   if: github.ref == 'refs/heads/main'
    if: github.event_name == 'workflow_dispatch'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Needs a GitHub secret GCP_SA_KEY = JSON key of a deploy service account with:
      #   roles/run.admin · roles/artifactregistry.writer · roles/iam.serviceAccountUser
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet
      # Reuse the SAME GCP_SA_KEY for the build-time model download: the auth step above
      # already wrote it to a file. That SA must have "Storage Object Viewer" on the bucket.
      - name: Build, push, deploy to Cloud Run
        run: make deploy GCS_KEY="${{ steps.auth.outputs.credentials_file_path }}"
