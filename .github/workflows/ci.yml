name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:        # manual trigger for the deploy job (until the app is ready)

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.10" }
      - name: Install backend deps
        run: pip install -r backend/requirements.txt pytest
      - name: Import smoke test
        run: python -c "import backend.main"
      - name: Unit tests
        run: pytest -q || [ "$?" = "5" ]   # tolerate "no tests collected" until tests land

  deploy:
    # Manual for now. Once the backend serves a real model, switch the guard to:
    #   if: github.ref == 'refs/heads/main'
    if: github.event_name == 'workflow_dispatch'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Needs a GitHub secret GCP_SA_KEY = JSON key of a deploy service account with:
      #   roles/run.admin · roles/artifactregistry.writer · roles/iam.serviceAccountUser
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet
      - name: Build, push, deploy to Cloud Run
        run: make deploy
